<div class="lp-fluid-card">
    <a href="{url}" target="_blank" rel="noopener" title="{title}">
        <div class="lp-fluid-avatar" style="background-image:url('{image}')!important;background-size:cover;background-position:center;" title="{name}"></div>
        <div class="lp-fluid-info">
            <p class="lp-fluid-name">{name}</p>
            <p class="lp-fluid-desc">{description}</p>
        </div>
    </a>
</div>
