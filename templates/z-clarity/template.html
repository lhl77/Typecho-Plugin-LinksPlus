<div class="lp-cl-card" data-sort="{sort}">
    <a href="{url}" target="_blank" rel="noopener" class="lp-cl-link" title="{title}">
        <div class="lp-cl-avatar-wrap">
            <div class="lp-cl-avatar" style="background-image:url('{image}')" role="img" aria-label="{name}"></div>
        </div>
        <div class="lp-cl-meta">
            <span class="lp-cl-author">{name}</span>
            <span class="lp-cl-domain">{url}</span>
        </div>
    </a>
    <div class="lp-cl-popup" aria-hidden="true">
        <div class="lp-cl-pop-head">
            <div class="lp-cl-pop-icon" style="background-image:url('{image}')" role="img" aria-label="{name}"></div>
            <div class="lp-cl-pop-info">
                <strong class="lp-cl-pop-name">{name}</strong>
                <code class="lp-cl-pop-url">{url}</code>
            </div>
        </div>
        <div class="lp-cl-pop-body">
            <p class="lp-cl-pop-desc">{description}</p>
        </div>
    </div>
</div>
