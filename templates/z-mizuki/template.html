<div class="lp-miz-card" data-url="{url}" data-sort="{sort}">
    <div class="lp-miz-header">
        <a href="{url}" target="_blank" rel="noopener" class="lp-miz-avatar-link" title="{title}">
            <div class="lp-miz-avatar" style="background-image:url('{image}')!important;background-size:cover;background-position:center;"></div>
        </a>
        <div class="lp-miz-meta">
            <a href="{url}" target="_blank" rel="noopener" class="lp-miz-name" title="{name}">{name}</a>
            <span class="lp-miz-url">{url}</span>
        </div>
    </div>
    <p class="lp-miz-desc">{description}</p>
    <div class="lp-miz-footer">
        <a href="{url}" target="_blank" rel="noopener" class="lp-miz-visit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> 访问
        </a>
        <button class="lp-miz-copy" type="button" aria-label="复制链接">
            <svg class="lp-miz-copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="lp-miz-copy-text">已复制</span>
        </button>
    </div>
</div>
