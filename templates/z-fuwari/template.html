<div class="lp-fw-card" data-sort="{sort}">
    <a href="{url}" target="_blank" rel="noopener" class="lp-fw-link" title="{title}">
        <div class="lp-fw-avatar" style="background-image:url('{image}')"></div>
        <div class="lp-fw-body">
            <span class="lp-fw-name">{name}</span>
            <p class="lp-fw-desc">{description}</p>
            <span class="lp-fw-tag">{sort}</span>
        </div>
        <span class="lp-fw-arrow" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>
        </span>
    </a>
</div>
