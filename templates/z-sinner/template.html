<div class="lp-sinner-card">
    <div class="lp-sinner-bg-avatar" style="background-image:url('{image}')!important;background-size:cover;background-position:center;" aria-hidden="true"></div>
    <a class="lp-sinner-avatar-link" href="{url}" target="_blank" rel="noopener" title="{title}">
        <div class="lp-sinner-avatar" style="background-image:url('{image}')!important;background-size:cover;background-position:center;" title="{name}"></div>
    </a>
    <div class="lp-sinner-info">
        <a class="lp-sinner-name" href="{url}" target="_blank" rel="noopener" title="{title}">{name}</a>
        <p class="lp-sinner-desc">{description}</p>
    </div>
</div>
