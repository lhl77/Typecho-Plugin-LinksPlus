<div class="lp-zm-link-box">
    <a href="{url}" target="_blank" class="lp-zm-no-underline" title="{title}" rel="noopener">
        <div class="lp-zm-thumb" style="background-image:url('{image}');background-size:cover;background-position:center;" title="{name}"></div>
        <div class="lp-zm-content">
            <p class="lp-zm-title">
                {name}
            </p>
        </div>
    </a>
</div>
